volumes:
  mongo-data: {}
  redis-data: {}
  typesense-data: {}

networks:
  jikan_network: {}

secrets:
  db_username:
    file: db_username.txt
  db_password:
    file: db_password.txt
  db_admin_username:
    file: db_admin_username.txt
  db_admin_password:
    file: db_admin_password.txt
  redis_password:
    file: redis_password.txt
  typesense_api_key:
    file: typesense_api_key.txt


services:

  jikan_rest:
    build:
      context: .
      dockerfile: Dockerfile
    image: jikan-rest:local
    user: "${APP_UID:-10001}:${APP_GID:-10001}"
    networks:
      - jikan_network
    secrets:
      - db_username
      - db_password
      - typesense_api_key
      - redis_password
    env_file:
      - ./docker/config/.env.compose
    environment:
      RR_WORKERS: 1   # 🔥 critical RAM reduction
    ports:
      - "8080:8080"
    hostname: jikan-rest-api
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:2114/health?plugin=http"]
      interval: 10s
      timeout: 3s
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      typesense:
        condition: service_healthy


  mongodb:
    image: docker.io/mongo:focal
    hostname: mongodb
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - 27017/tcp
    command: >
      mongod
      --wiredTigerCacheSizeGB 0.25
      --quiet
      --syncdelay 60
    networks:
      - jikan_network
    environment:
      MONGO_INITDB_ROOT_USERNAME_FILE: /run/secrets/db_admin_username
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/db_admin_password
      MONGO_INITDB_DATABASE: jikan_admin
    secrets:
      - db_username
      - db_password
      - db_admin_username
      - db_admin_password
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh mongodb://localhost:27017 --quiet
      interval: 30s
      timeout: 10s
      retries: 5


  redis:
    image: docker.io/redis:6-alpine
    hostname: redis
    secrets:
      - redis_password
    networks:
      - jikan_network
    command:
      - /bin/sh
      - -c
      - redis-server --requirepass "$$(cat /run/secrets/redis_password)" --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data:rw
    ports:
      - '6379/tcp'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 2s
      retries: 3


  typesense:
    image: docker.io/typesense/typesense:0.24.1
    hostname: typesense
    entrypoint: /bin/sh
    secrets:
      - typesense_api_key
    networks:
      - jikan_network
    command:
      - -c
      - TYPESENSE_API_KEY="$$(cat /run/secrets/typesense_api_key)" /opt/typesense-server --data-dir /data --cache-max-memory 256mb
    volumes:
      - typesense-data:/data
    ports:
      - "8108/tcp"
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[t]ypesense-server' > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s


  jikan_refresh_sidecar:
    build:
      context: .
      dockerfile: Dockerfile
    image: jikan-rest:local
    user: "${APP_UID:-10001}:${APP_GID:-10001}"
    networks:
      - jikan_network
    secrets:
      - db_username
      - db_password
      - db_admin_username
      - db_admin_password
      - redis_password
      - typesense_api_key
    env_file:
      - ./docker/config/.env.compose
    environment:
      # Refresh interval in seconds (86400 = 24 hours)
      REFRESH_INTERVAL: "86400"
      # Number of anime to process in each batch
      BATCH_SIZE: "100"
      # Delay between API requests in seconds
      DELAY: "3"
    entrypoint: /bin/sh
    command: /app/docker-entrypoint-refresh.sh
    volumes:
      - ./docker-entrypoint-refresh.sh:/app/docker-entrypoint-refresh.sh:ro
    depends_on:
      jikan_rest:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
